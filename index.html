  <!-- Tema inicial (evita flash) -->
  <script>
    try {
      if (
        localStorage.theme === "dark" ||
        (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    } catch (_) { }
  </script>

  <style>
    #root::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      z-index: 99999;
      width: 100vw;
      height: 100vh;
      background: black;
      opacity: 1;
      pointer-events: none;
      transition: opacity 0.5s ease-out;
    }

    #root.loaded::before {
      opacity: 0;
    }

    #root.loaded-complete::before {
      display: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
